<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1f1f22">
  <title>Mosaic Crochet</title>
  <link id="favicon" rel="icon" type="image/png">
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <header class="toolbar" id="toolbar">
    <div class="tb-row">
      <div class="tb-group g-file">
        <button class="btn" id="btn-edit"   popovertarget="edit-pattern-widget" aria-haspopup="dialog" aria-expanded="false" title="Pattern dimensions">Pattern</button>
        <button class="btn" id="btn-load"   title="Load .mcw file">Load</button>
        <button class="btn" id="btn-save"   title="Save as .mcw file">Save</button>
        <button class="btn" id="btn-export" title="Export pattern as text">Export</button>
        <button class="btn" id="btn-undo"   title="Undo (Ctrl+Z)">Undo</button>
        <button class="btn" id="btn-redo"   title="Redo (Ctrl+Y / Ctrl+Shift+Z)">Redo</button>
      </div>
      <div class="tb-group g-hlrot">
        <button class="btn btn--icon" id="rotate-ccw" title="Rotate counter-clockwise (Shift+R)" aria-label="Rotate counter-clockwise">↺</button>
        <button class="btn btn--icon" id="rotate-cw"  title="Rotate clockwise (R)"               aria-label="Rotate clockwise">↻</button>
        <button class="btn btn--icon" id="btn-hl-toggle" popovertarget="hl-popover" title="Settings" aria-label="Settings" aria-haspopup="dialog">⚙</button>
      </div>
    </div>

    <div class="tb-row">
      <div class="tb-group g-tools" role="radiogroup" aria-label="Tool">
        <button class="btn btn--icon" id="tool-pencil" title="Pencil (P)" aria-label="Pencil">✏️</button>
        <button class="btn btn--icon" id="tool-fill"   title="Fill (F)"   aria-label="Fill">🪣</button>
        <button class="btn btn--icon" id="tool-eraser"  title="Eraser (E) — restore natural; right-click adds overlay" aria-label="Eraser">🧹</button>
        <button class="btn btn--icon" id="tool-overlay" title="Overlay (O) — paint ✕ stitches; right-click restores natural" aria-label="Overlay">✕</button>
        <button class="btn btn--icon" id="tool-invert"  title="Invert (I)" aria-label="Invert">⇋</button>
        <button class="btn btn--icon" id="tool-select"  title="Select (S) — drag for rectangle; Shift adds, Ctrl removes" aria-label="Select">▭</button>
      </div>

      <div class="tb-group g-sym" aria-label="Symmetry">
        <button class="btn btn--icon" id="sym-vertical"   title="Vertical mirror (V)"     aria-label="Vertical symmetry">↔</button>
        <button class="btn btn--icon" id="sym-horizontal" title="Horizontal mirror (H)"   aria-label="Horizontal symmetry">↕</button>
        <button class="btn btn--icon" id="sym-central"    title="Central symmetry (C)"    aria-label="Central symmetry">⊕</button>
        <button class="btn btn--icon" id="sym-diag1"      title="Diagonal ╲ (D)"          aria-label="Diagonal symmetry">╲</button>
        <button class="btn btn--icon" id="sym-diag2"      title="Anti-diagonal ╱ (A)"     aria-label="Anti-diagonal symmetry">╱</button>
      </div>

      <div class="tb-group g-colors" aria-label="Colours">
        <div id="swatch-a" class="swatch swatch--active" tabindex="0" role="button" title="Primary colour (1) — double-click or long-press to edit" aria-label="Primary colour">
          <input type="color" id="color-a" value="#000000" tabindex="-1">
        </div>
        <div id="swatch-b" class="swatch" tabindex="0" role="button" title="Secondary colour (2) — double-click or long-press to edit" aria-label="Secondary colour">
          <input type="color" id="color-b" value="#ffffff" tabindex="-1">
        </div>
      </div>
    </div>
  </header>

  <main class="canvas-area">
    <canvas id="canvas"></canvas>
    <div id="status" class="status"></div>
  </main>

  <!-- ── Settings popover ─────────────────────────────────────────────── -->
  <div id="hl-popover" popover>
    <div class="popover-row" title="Fades the ✕ overlay marks and ! invalid marks. 0 hides them entirely.">
      <span class="popover-label">Highlight opacity</span>
      <input type="range" id="hl-opacity" value="100" min="0" max="100" aria-label="Highlight opacity">
    </div>
    <div class="popover-row" title="How vivid the ! invalid markers are. Hue is picked automatically to contrast with your colours; this slider only adjusts intensity.">
      <span class="popover-label">Invalid marker intensity</span>
      <input type="range" id="invalid-intensity" value="65" min="0" max="100" aria-label="Invalid marker intensity">
    </div>
    <label class="toggle popover-row" title="Row numbers in the left gutter, round numbers above (half/quarter) or in the corner cells (full).">
      <span class="popover-label">Show numbers</span>
      <input type="checkbox" id="labels-on" checked>
      <span class="toggle-track"></span>
    </label>
    <label class="toggle popover-row" title="Block paint on cells that can never host a valid overlay (top row in row mode; outermost ring and diagonal corners in round mode). Fixing an already-wrong cell still works.">
      <span class="popover-label">Lock cells with no valid overlay</span>
      <input type="checkbox" id="lock-invalid">
      <span class="toggle-track"></span>
    </label>
  </div>

  <!-- ── Pattern (Edit) popover ──────────────────────────────────────── -->
  <div id="edit-pattern-widget" popover>
    <div class="segmented">
      <label><input type="radio" name="edit-mode" value="row" checked> Row</label>
      <label><input type="radio" name="edit-mode" value="round"> Round</label>
    </div>

    <div id="edit-row-controls" class="field-group">
      <div class="field-row">
        <label for="edit-width">Width</label>
        <input type="number" id="edit-width" value="16" min="2">
      </div>
      <div class="field-row">
        <label for="edit-height">Height</label>
        <input type="number" id="edit-height" value="16" min="2">
      </div>
    </div>

    <div id="edit-round-controls" class="field-group" hidden>
      <div class="segmented">
        <label><input type="radio" name="edit-submode" value="full" checked> Full</label>
        <label><input type="radio" name="edit-submode" value="half"> Half</label>
        <label><input type="radio" name="edit-submode" value="quarter"> Quarter</label>
      </div>
      <div class="field-row">
        <label for="edit-inner-width">Inner W</label>
        <input type="number" id="edit-inner-width" value="3" min="0">
      </div>
      <div class="field-row">
        <label for="edit-inner-height">Inner H</label>
        <input type="number" id="edit-inner-height" value="3" min="0">
      </div>
      <div class="field-row">
        <label for="edit-rounds">Rounds</label>
        <input type="number" id="edit-rounds" value="5" min="1">
      </div>
    </div>

    <label class="toggle" title="When on, the new dimensions get a fresh pattern with natural colours. Forced on (disabled) for mode switches and inner-dimension changes.">
      <input type="checkbox" id="edit-wipe">
      <span class="toggle-track"></span>
      Wipe
    </label>
  </div>

  <!-- ── Export dialog ──────────────────────────────────────────────── -->
  <dialog id="export-dialog" aria-labelledby="export-title">
    <div class="dlg-header">
      <span class="dlg-title" id="export-title">Export pattern</span>
      <span id="export-progress" class="dlg-progress" hidden></span>
      <button class="dlg-close" id="export-close" aria-label="Close" type="button">✕</button>
    </div>
    <div class="dlg-body">
      <label class="toggle">
        <input type="checkbox" id="alternate">
        <span class="toggle-track"></span>
        Alternate direction
      </label>
      <div id="export-warning" class="warning" hidden>
        ⚠ Pattern has invalid placements (! marks). Export may be incorrect.
      </div>
      <textarea id="export-text" rows="20" readonly spellcheck="false"></textarea>
    </div>
    <div class="dlg-footer">
      <button class="btn" id="export-copy" type="button">Copy</button>
      <button class="btn" id="export-download" type="button">Download .txt</button>
    </div>
  </dialog>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
