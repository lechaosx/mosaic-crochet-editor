<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1f1f22">
  <title>Mosaic Crochet</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <header class="toolbar" id="toolbar">
    <div class="tb-group g-file">
      <button class="btn" id="btn-new" popovertarget="new-pattern-widget" aria-haspopup="dialog" aria-expanded="false">New</button>
      <button class="btn" id="btn-load">Load</button>
      <button class="btn" id="btn-save">Save</button>
      <button class="btn" id="btn-export">Export</button>
      <button class="btn" id="btn-undo" title="Undo (Ctrl+Z)">Undo</button>
      <button class="btn" id="btn-redo" title="Redo (Ctrl+Y)">Redo</button>
    </div>

    <div class="tb-break" aria-hidden="true"></div>

    <div class="tb-group g-tools" role="radiogroup" aria-label="Tool">
      <button class="btn btn--icon" id="tool-pencil" title="Pencil (P)" aria-label="Pencil">✏️</button>
      <button class="btn btn--icon" id="tool-fill"   title="Fill (F)"   aria-label="Fill">🪣</button>
      <button class="btn btn--icon" id="tool-eraser" title="Eraser (E)" aria-label="Eraser">🧹</button>
    </div>

    <div class="tb-group g-sym" aria-label="Symmetry">
      <button class="btn btn--icon" id="sym-vertical"   title="Vertical"      aria-label="Vertical symmetry">↔</button>
      <button class="btn btn--icon" id="sym-horizontal" title="Horizontal"    aria-label="Horizontal symmetry">↕</button>
      <button class="btn btn--icon" id="sym-central"    title="Central"       aria-label="Central symmetry">⊕</button>
      <button class="btn btn--icon" id="sym-diag1"      title="Diagonal ╲"    aria-label="Diagonal symmetry">╲</button>
      <button class="btn btn--icon" id="sym-diag2"      title="Anti-diagonal ╱" aria-label="Anti-diagonal symmetry">╱</button>
    </div>

    <div class="tb-group g-colors" aria-label="Colours">
      <div id="swatch-a" class="swatch swatch--active" tabindex="0" role="button" aria-label="Primary colour (long-press to edit)">
        <input type="color" id="color-a" value="#000000" tabindex="-1">
      </div>
      <div id="swatch-b" class="swatch" tabindex="0" role="button" aria-label="Secondary colour (long-press to edit)">
        <input type="color" id="color-b" value="#ffffff" tabindex="-1">
      </div>
    </div>

    <div class="tb-group g-hlrot">
      <button class="btn btn--icon" id="btn-hl-toggle" popovertarget="hl-popover" title="Highlight settings" aria-label="Highlight settings" aria-haspopup="dialog">⊙</button>
      <button class="btn btn--icon" id="rotate-ccw" title="Rotate counter-clockwise" aria-label="Rotate counter-clockwise">↺</button>
      <button class="btn btn--icon" id="rotate-cw"  title="Rotate clockwise"          aria-label="Rotate clockwise">↻</button>
    </div>
  </header>

  <main class="canvas-area">
    <canvas id="canvas"></canvas>
    <div id="status" class="status"></div>
  </main>

  <!-- ── Highlight settings popover ────────────────────────────────── -->
  <div id="hl-popover" popover>
    <div class="popover-row">
      <span class="popover-label">Overlay</span>
      <div id="swatch-hl-overlay" class="swatch swatch--small" tabindex="0" role="button" aria-label="Overlay colour">
        <input type="color" id="hl-overlay-color" value="#0000ff" tabindex="-1">
      </div>
    </div>
    <div class="popover-row">
      <span class="popover-label">Invalid</span>
      <div id="swatch-hl-invalid" class="swatch swatch--small" tabindex="0" role="button" aria-label="Invalid colour">
        <input type="color" id="hl-invalid-color" value="#ff0000" tabindex="-1">
      </div>
    </div>
    <div class="popover-row">
      <span class="popover-label">Opacity</span>
      <input type="range" id="hl-opacity" value="50" min="0" max="100" aria-label="Highlight opacity">
    </div>
  </div>

  <!-- ── New-pattern popover ─────────────────────────────────────────── -->
  <div id="new-pattern-widget" popover>
    <div class="segmented">
      <label><input type="radio" name="np-mode" value="row" checked> Row</label>
      <label><input type="radio" name="np-mode" value="round"> Round</label>
    </div>

    <div id="row-controls" class="field-group">
      <div class="field-row">
        <label for="width">Width</label>
        <input type="number" id="width" value="16" min="2">
      </div>
      <div class="field-row">
        <label for="height">Height</label>
        <input type="number" id="height" value="16" min="2">
      </div>
    </div>

    <div id="round-controls" class="field-group" hidden>
      <div class="segmented">
        <label><input type="radio" name="np-submode" value="full" checked> Full</label>
        <label><input type="radio" name="np-submode" value="half"> Half</label>
        <label><input type="radio" name="np-submode" value="quarter"> Quarter</label>
      </div>
      <div class="field-row">
        <label for="inner-width">Inner W</label>
        <input type="number" id="inner-width" value="3" min="0">
      </div>
      <div class="field-row">
        <label for="inner-height">Inner H</label>
        <input type="number" id="inner-height" value="3" min="0">
      </div>
      <div class="field-row">
        <label for="rounds">Rounds</label>
        <input type="number" id="rounds" value="5" min="1">
      </div>
    </div>
  </div>

  <!-- ── Export dialog ──────────────────────────────────────────────── -->
  <dialog id="export-dialog" aria-labelledby="export-title">
    <div class="dlg-header">
      <span class="dlg-title" id="export-title">Export pattern</span>
      <span id="export-progress" class="dlg-progress" hidden></span>
      <button class="dlg-close" id="export-close" aria-label="Close" type="button">✕</button>
    </div>
    <div class="dlg-body">
      <label class="toggle">
        <input type="checkbox" id="alternate">
        <span class="toggle-track"></span>
        Alternate direction
      </label>
      <div id="export-warning" class="warning" hidden>
        ⚠ Pattern has invalid placements (red pixels). Export may be incorrect.
      </div>
      <textarea id="export-text" rows="20" readonly spellcheck="false"></textarea>
    </div>
    <div class="dlg-footer">
      <button class="btn" id="export-copy" type="button">Copy</button>
      <button class="btn" id="export-download" type="button">Download .txt</button>
    </div>
  </dialog>

  <!-- ── Dirty confirm dialog ──────────────────────────────────────── -->
  <dialog id="dirty-dialog" class="dlg--narrow" aria-labelledby="dirty-title">
    <div class="dlg-header">
      <span class="dlg-title" id="dirty-title">Unsaved changes</span>
    </div>
    <div class="dlg-body">
      <p class="dlg-message">You have unsaved changes.</p>
    </div>
    <div class="dlg-footer">
      <button class="btn" id="dirty-cancel" type="button">Cancel</button>
      <button class="btn btn--danger" id="dirty-discard" type="button">Discard</button>
    </div>
  </dialog>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
